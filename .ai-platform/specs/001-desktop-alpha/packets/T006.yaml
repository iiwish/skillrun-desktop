schema_version: "ai-delivery-governor.packet.v1"
packet_id: "001-desktop-alpha-T006"
task_id: "T006"
feature_id: "001-desktop-alpha"
mode: "implementation"

governance_inputs:
  constitution: ".ai-platform/memory/constitution.md"
  product_design: ".ai-platform/docs/product-design.md"
  feature_spec: ".ai-platform/specs/001-desktop-alpha/spec.md"
  requirements_checklist: ".ai-platform/specs/001-desktop-alpha/checklists/requirements.md"
  technical_plan: ".ai-platform/specs/001-desktop-alpha/plan.md"
  work_graph: ".ai-platform/specs/001-desktop-alpha/tasks.md"
  analysis: ".ai-platform/specs/001-desktop-alpha/analysis.md"
  source_docs:
    - "docs/desktop-core-contract.md"
    - "docs/desktop-alpha-roadmap.md"
  dependency_evidence:
    - ".ai-platform/evidence/T002/summary.md"
    - ".ai-platform/evidence/T003/summary.md"
    - ".ai-platform/evidence/T004/summary.md"
    - ".ai-platform/evidence/T005/summary.md"

work_unit:
  title: "Implement Capsule Switchboard"
  goal: "展示 capsule inventory，并支持显式 enable/disable；状态变化后刷新 inventory 和 exposure。"
  story_or_requirement:
    - "US-003"
    - "FR-006"
    - "FR-007"
    - "FR-011"
    - "NFR-001"
  priority: "P0"
  depends_on:
    - "T004"
  blocks:
    - "T007"
  parallel: false
  conflicts_with:
    - "T005"
    - "T007"
  expected_deliverables:
    - "Switchboard service reads consumer inventory/exposure through Core contracts."
    - "Enable/disable calls use skillrun switchboard enable|disable CAPSULE_ID and then refresh inventory and exposure."
    - "Switchboard state exposes capsule readiness, enabled exposure intent, imported confirmation need, and Core errors."
    - "Switchboard view presents list/action states without trust/safe/runnable overclaiming."

codebase_context:
  current_repo_state: "T001-T005 are accepted. T006 can use T002 runner, T003 inventory/exposure parsers, and T004/T005 state patterns."
  relevant_existing_files:
    - "src/core/runner.ts"
    - "src/core/errors.ts"
    - "src/core/contracts/index.ts"
    - "src/core/fixtures/consumer-inventory.v1.json"
    - "src/core/fixtures/consumer-exposure.v1.json"
    - "src/state/importFlow.ts"
    - "src/views/ImportFlow/ImportFlow.tsx"
  existing_patterns:
    - "Core JSON commands use runSkillrunJson with injected CommandExecutor."
    - "State modules convert Core contracts into UI-safe view models and are covered by Vitest."
    - "Presentational views receive state/callback props and avoid hidden Core side effects."
  core_contract_notes:
    - "Primary list source is skillrun consumer inventory --json."
    - "Enable/disable commands are skillrun switchboard enable CAPSULE_ID and skillrun switchboard disable CAPSULE_ID."
    - "Core switchboard enable/disable currently return text, not JSON; treat non-zero exit as failure and do not parse stdout JSON."
    - "After enable/disable, refresh both consumer inventory --json and consumer exposure --json."
    - "enabled=true means exposure intent only; it is not trusted, safe, sandboxed, or business-correct."
    - "readiness.ok=false must not be described as runnable."
  forbidden_changes:
    - "不得读取 registry 文件或 .skillrun/manifest.generated.yaml。"
    - "不得解析 Manifest YAML、展开 .skr 或扫描 Core 内部目录。"
    - "不得启动 router serve --mcp 长运行进程。"
    - "不得把 enabled/readiness/exposed 描述成 trusted、safe、sandboxed 或 guaranteed runnable。"
    - "不得为 enable failure 猜测 install/fix/repair 操作。"

execution_constraints:
  allowed_files:
    - "src/views/Switchboard/**"
    - "src/state/switchboard.ts"
    - "src/state/switchboard.test.ts"
    - "src/core/switchboardService.ts"
    - ".ai-platform/specs/001-desktop-alpha/packets/T006.yaml"
    - ".ai-platform/specs/001-desktop-alpha/tasks.md"
    - ".ai-platform/docs/tasks.md"
    - ".ai-platform/docs/release-report.md"
    - ".ai-platform/evidence/T006/**"
  disallowed_files:
    - "src-tauri/**"
    - "src/core/runner.ts"
    - "src/core/contracts/**"
    - "src/tray/**"
    - "docs/**"
    - "src/App.tsx"
  branch_or_worktree: "Use current worktree after checking git status; T005 commit f35954f must be present."
  ownership: "T006 owns switchboard service, switchboard state, switchboard view, packet/status docs, and evidence only."
  stop_if:
    - "T004 or T005 is not accepted."
    - "Implementation requires changing Core runner/parser contracts."
    - "Implementation requires wiring global dashboard navigation outside allowed files."
    - "Core enable/disable command behavior requires parsing undocumented JSON."

tdd_plan:
  red:
    - "Add switchboard state/service tests first and confirm they fail because switchboard modules do not exist."
    - "Capture RED output in .ai-platform/evidence/T006/test-results.md."
  green:
    - "Implement switchboard service with injected executor and raw enable/disable command handling."
    - "Implement switchboard state mapping, confirmation rules, and failure handling."
    - "Implement a small Switchboard presentational component."
  refactor:
    - "Only extract label helpers after tests pass; keep scope inside allowed files."
  exception_policy: "TDD exception is not pre-approved for T006."

validation_loop:
  commands:
    - "npm test -- src/state/switchboard.test.ts --run"
    - "npm exec tsc -- --noEmit"
    - "npm run build"
    - "npm test -- --run"
  expected_signals:
    - "Switchboard tests fail in RED before implementation and pass in GREEN."
    - "Enable action calls switchboard enable CAPSULE_ID exactly once, then refreshes inventory and exposure."
    - "Disable action calls switchboard disable CAPSULE_ID exactly once, then refreshes inventory and exposure."
    - "enabled=true is labelled as exposure intent only."
    - "readiness failure is not labelled runnable and cannot be enabled by state policy."
    - "Core failure is surfaced without repair/install guesses."
  retry_budget: 2
  failure_handling:
    - "First failure: fix task-scoped service/state/view issue."
    - "Second failure: decide whether Core switchboard command contract ambiguity blocks T006."
    - "Do not weaken safety-copy assertions."

evidence_contract:
  evidence_dir: ".ai-platform/evidence/T006"
  required_files:
    - "summary.md"
    - "diff.patch"
    - "test-results.md"
  summary_must_include:
    - "Changed files."
    - "RED/GREEN command outputs."
    - "Switchboard safety review."
    - "Copy review notes."
    - "Diff summary."
    - "Residual risk."

review_contract:
  spec_compliance:
    - "Matches US-003, FR-006, FR-007, FR-011, and NFR-001."
    - "No registry, manifest, .skillrun, or .skr internals are read."
    - "Enable/disable requires explicit action and refreshes inventory/exposure afterward."
  engineering_quality:
    - "Core calls are dependency-injected and testable."
    - "Raw switchboard text commands handle non-zero exit without JSON assumptions."
    - "View component is presentational and does not perform hidden dangerous side effects."
  qa_acceptance:
    - "A future dashboard can list capsules, identify readiness, require imported enable confirmation, and refresh exposure state."

handoff:
  next_tasks:
    - "T007"
  finish_options_after_acceptance:
    - "Keep local commit/worktree."
    - "Continue to T007 packetize."
  user_acceptance_required: true

stop_conditions:
  - "RED tests cannot be captured."
  - "Validation commands cannot run."
  - "Implementation requires broad app navigation changes."
