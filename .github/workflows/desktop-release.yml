name: Desktop Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Desktop semver to release, for example 0.1.0"
        required: true
        type: string
      skillrun_repo:
        description: Git repository used to install the skillrun CLI for the release Core smoke gate
        required: false
        default: https://github.com/iiwish/skillrun
        type: string
      skillrun_ref:
        description: Optional git revision for the skillrun CLI install
        required: false
        default: ""
        type: string
      skillrun_expected_version:
        description: Optional expected substring from skillrun --version
        required: false
        default: ""
        type: string
  push:
    tags:
      - "desktop-v*"
      - "v*"

permissions:
  contents: write

jobs:
  real-core-smoke:
    name: Real Core smoke gate
    runs-on: macos-latest
    env:
      HOME: ${{ github.workspace }}/.tmp/skillrun-desktop-release-home
      SKILLRUN_HOME: ${{ github.workspace }}/.tmp/skillrun-desktop-release-home/.skillrun
      XDG_CONFIG_HOME: ${{ github.workspace }}/.tmp/skillrun-desktop-release-home/.config
      SKILLRUN_REPO: ${{ inputs.skillrun_repo || 'https://github.com/iiwish/skillrun' }}
      SKILLRUN_CORE_REF: ${{ inputs.skillrun_ref }}
      SKILLRUN_EXPECTED_VERSION: ${{ inputs.skillrun_expected_version }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare isolated smoke home
        shell: bash
        run: |
          mkdir -p "$SKILLRUN_HOME" "$XDG_CONFIG_HOME"
          {
            echo "Real Core smoke is a required alpha release gate."
            echo "HOME=$HOME"
            echo "SKILLRUN_HOME=$SKILLRUN_HOME"
            echo "XDG_CONFIG_HOME=$XDG_CONFIG_HOME"
            echo "SKILLRUN_REPO=$SKILLRUN_REPO"
            echo "SKILLRUN_CORE_REF=${SKILLRUN_CORE_REF:-<default>}"
            echo "SKILLRUN_EXPECTED_VERSION=${SKILLRUN_EXPECTED_VERSION:-<not constrained>}"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust artifacts
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Install requested skillrun CLI
        shell: bash
        run: scripts/install-local-skillrun-cli.sh

      - name: Install frontend dependencies
        run: npm ci

      - name: Run real Core smoke through Desktop JSON runner
        shell: bash
        run: |
          npm run smoke:real-core | tee "$RUNNER_TEMP/real-core-smoke.log"
          {
            echo "## Real Core smoke"
            sed -n '/Real Core smoke summary:/,/Real Core smoke trace:/p' "$RUNNER_TEMP/real-core-smoke.log" | sed '$d'
          } >> "$GITHUB_STEP_SUMMARY"

  build:
    name: Build ${{ matrix.name }}
    needs: real-core-smoke
    runs-on: ${{ matrix.platform }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS arm64
            platform: macos-latest
            args: "--target aarch64-apple-darwin"
          - name: macOS x64
            platform: macos-latest
            args: "--target x86_64-apple-darwin"
          - name: Windows x64
            platform: windows-latest
            args: ""
          - name: Linux x64
            platform: ubuntu-22.04
            args: ""

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Linux bundle dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Resolve release version
        id: release
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            version="${{ inputs.version }}"
            version="${version#desktop-v}"
            version="${version#v}"
            tag="desktop-v${version}"
          else
            tag="${GITHUB_REF_NAME}"
            version="${tag#desktop-v}"
            version="${version#v}"
          fi

          echo "DESKTOP_RELEASE_VERSION=${version}" >> "$GITHUB_ENV"
          echo "DESKTOP_RELEASE_TAG=${tag}" >> "$GITHUB_ENV"
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"

      - name: Synchronize Desktop versions
        shell: bash
        run: |
          node scripts/sync-desktop-version.mjs --version "${{ steps.release.outputs.version }}"
          node scripts/sync-desktop-version.mjs --version "${{ steps.release.outputs.version }}" --check

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ startsWith(matrix.platform, 'macos') && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Cache Rust artifacts
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Install frontend dependencies
        run: npm ci

      - name: Build and upload Tauri release artifacts
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ steps.release.outputs.tag }}
          releaseName: "SkillRun Desktop ${{ steps.release.outputs.tag }}"
          releaseBody: |
            Alpha Desktop packages for ${{ steps.release.outputs.tag }}.

            Code signing and notarization are intentionally not required for alpha testing.
          releaseDraft: true
          prerelease: true
          args: ${{ matrix.args }}
