name: Desktop Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Desktop semver to release, for example 0.1.0"
        required: true
        type: string
      skillrun_repo:
        description: Git repository used to install the skillrun CLI for the release Core smoke gate
        required: false
        default: https://github.com/iiwish/skillrun
        type: string
      skillrun_ref:
        description: Optional git revision for the skillrun CLI install
        required: false
        default: ""
        type: string
      skillrun_expected_version:
        description: Optional expected substring from skillrun --version
        required: false
        default: ""
        type: string
  push:
    tags:
      - "desktop-v*"
      - "v*"

permissions:
  contents: write

jobs:
  real-core-smoke:
    name: Real Core smoke gate
    runs-on: macos-latest
    env:
      HOME: ${{ github.workspace }}/.tmp/skillrun-desktop-release-home
      SKILLRUN_HOME: ${{ github.workspace }}/.tmp/skillrun-desktop-release-home/.skillrun
      XDG_CONFIG_HOME: ${{ github.workspace }}/.tmp/skillrun-desktop-release-home/.config
      SKILLRUN_REPO: ${{ inputs.skillrun_repo || 'https://github.com/iiwish/skillrun' }}
      SKILLRUN_CORE_REF: ${{ inputs.skillrun_ref }}
      SKILLRUN_EXPECTED_VERSION: ${{ inputs.skillrun_expected_version }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Prepare isolated smoke home
        shell: bash
        run: |
          mkdir -p "$SKILLRUN_HOME" "$XDG_CONFIG_HOME"
          {
            echo "Real Core smoke is a required alpha release gate."
            echo "HOME=$HOME"
            echo "SKILLRUN_HOME=$SKILLRUN_HOME"
            echo "XDG_CONFIG_HOME=$XDG_CONFIG_HOME"
            echo "SKILLRUN_REPO=$SKILLRUN_REPO"
            echo "SKILLRUN_CORE_REF=${SKILLRUN_CORE_REF:-<default>}"
            echo "SKILLRUN_EXPECTED_VERSION=${SKILLRUN_EXPECTED_VERSION:-<not constrained>}"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust artifacts
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Install requested skillrun CLI
        shell: bash
        run: scripts/install-local-skillrun-cli.sh

      - name: Install frontend dependencies
        run: npm ci

      - name: Run real Core smoke through Desktop JSON runner
        shell: bash
        run: |
          npm run smoke:real-core | tee "$RUNNER_TEMP/real-core-smoke.log"
          {
            echo "## Real Core smoke"
            sed -n '/Real Core smoke summary:/,/Real Core smoke trace:/p' "$RUNNER_TEMP/real-core-smoke.log" | sed '$d'
          } >> "$GITHUB_STEP_SUMMARY"

  build:
    name: Build ${{ matrix.name }}
    needs: real-core-smoke
    runs-on: ${{ matrix.platform }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS arm64
            platform: macos-latest
            args: "--target aarch64-apple-darwin"
          - name: macOS x64
            platform: macos-latest
            args: "--target x86_64-apple-darwin"
          - name: Windows x64
            platform: windows-latest
            args: "--bundles nsis"
          - name: Linux x64
            platform: ubuntu-22.04
            args: ""

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install Linux bundle dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: npm

      - name: Resolve release version
        id: release
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            version="${{ inputs.version }}"
            version="${version#desktop-v}"
            version="${version#v}"
            tag="desktop-v${version}"
          else
            tag="${GITHUB_REF_NAME}"
            version="${tag#desktop-v}"
            version="${version#v}"
          fi

          echo "DESKTOP_RELEASE_VERSION=${version}" >> "$GITHUB_ENV"
          echo "DESKTOP_RELEASE_TAG=${tag}" >> "$GITHUB_ENV"
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"

      - name: Synchronize Desktop versions
        shell: bash
        run: |
          node scripts/sync-desktop-version.mjs --version "${{ steps.release.outputs.version }}"
          node scripts/sync-desktop-version.mjs --version "${{ steps.release.outputs.version }}" --check

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ startsWith(matrix.platform, 'macos') && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Cache Rust artifacts
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Install frontend dependencies
        run: npm ci

      - name: Build and upload Tauri release artifacts
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ steps.release.outputs.tag }}
          releaseName: "SkillRun Desktop ${{ steps.release.outputs.tag }}"
          releaseBody: |
            SkillRun Desktop ${{ steps.release.outputs.tag }} 是用于验证 Tauri 桌面端多平台打包链路的 alpha release。

            ## Alpha 范围

            - 本 release 只用于早期 Desktop 安装包验证。
            - alpha 主线保持为 import -> review -> enable -> preview -> mount -> inspect runs。
            - marketplace、signed package trust、dependency installation、daemon behavior、artifact viewer、log viewer 和 authoring IDE workflow 均不在本次范围内。

            ## 本次 UX 验证焦点

            - Settings Core diagnostics、Core path/version/error 解释和 Core CLI 安装引导。
            - Team Library catalog 空态、blocked item 说明和中等宽度可读性。
            - Router diagnostics 在 Settings、Exposure 和状态栏 dropdown 之间的入口关系。
            - 底部状态栏不再常驻显示语言切换；语言切换保留在 Settings。

            ## 签名与 notarization

            - macOS packages 未签名，且未 notarize。
            - Windows 和 Linux packages 未签名。
            - 安装或首次启动时可能出现操作系统安全提示。

            ## 产物验证状态

            | Platform | Artifact target | Validation status |
            | --- | --- | --- |
            | macOS arm64 | DMG / app bundle | 待本机安装和启动验证后再 publish。 |
            | macOS x64 | DMG / app bundle | 已由 GitHub Actions 生成；本地硬件验证待补。 |
            | Windows x64 | NSIS installer (.exe) | 已由 GitHub Actions 生成；人工安装和启动验证待补。 |
            | Linux x64 | Linux package | 已由 GitHub Actions 生成；人工安装和启动验证待补。 |
          releaseDraft: true
          prerelease: true
          args: ${{ matrix.args }}

  asset-guard:
    name: Verify release asset set
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: npm

      - name: Resolve release version
        id: release
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            version="${{ inputs.version }}"
            version="${version#desktop-v}"
            version="${version#v}"
            tag="desktop-v${version}"
          else
            tag="${GITHUB_REF_NAME}"
            version="${tag#desktop-v}"
            version="${version#v}"
          fi

          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"

      - name: Fetch release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release view "${{ steps.release.outputs.tag }}" \
            --json assets \
            --jq '.assets' > "$RUNNER_TEMP/release-assets.json"

      - name: Verify release assets
        run: |
          node scripts/verify-desktop-release-assets.mjs \
            --version "${{ steps.release.outputs.version }}" \
            --assets-json "$RUNNER_TEMP/release-assets.json"
